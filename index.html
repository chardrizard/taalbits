<!DOCTYPE html>
<html lang="nl">

<title>Taalbits — Korte oefeningen voor lastig Nederlands</title>
<meta name="description" content="Oefen werkwoorden, preposities en vaste combinaties met korte Nederlandse quizzen op B1+ niveau.">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Taalbits">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Open Graph -->
<meta property="og:title" content="Taalbits — Korte oefeningen voor lastig Nederlands">
<meta property="og:description" content="Oefen werkwoorden, preposities en vaste combinaties met korte Nederlandse quizzen op B1+ niveau.">
<meta property="og:image" content="og-image.png">
<meta property="og:type" content="website">

<!-- Favicon & Icons -->
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png?v=2">

<!-- PWA Manifest -->
<link rel="manifest" href="site.webmanifest">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0F1117;--surface:#181A20;--surface-2:#1E2028;--surface-3:#252830;--ink:#E8E9ED;--ink-2:#A0A3AD;--ink-3:#6B6F7B;--ink-4:#3E414B;--border:rgba(255,255,255,0.06);--border-2:rgba(255,255,255,0.10);--correct:#2D6A4F;--correct-bg:rgba(45,106,79,0.12);--correct-border:rgba(45,106,79,0.4);--wrong:#C44536;--wrong-bg:rgba(196,69,54,0.12);--wrong-border:rgba(196,69,54,0.4);--radius:12px;--radius-lg:16px;--font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;--hint-color:rgba(180,190,210,0.85);--hint-bg:rgba(180,190,210,0.06);--hint-border:rgba(180,190,210,0.12);--hint-bg-hover:rgba(180,190,210,0.10);--hint-border-hover:rgba(180,190,210,0.18);--focus-ring:rgba(120,160,255,0.6);--shadow-border:0 0 0 1px rgba(255,255,255,0.08);--shadow-border-hover:0 0 0 1px rgba(255,255,255,0.13);--shadow-elevated:0 0 0 1px rgba(255,255,255,0.10),0 18px 48px rgba(0,0,0,0.38);--ease-out:cubic-bezier(0.2,0,0,1);--safe-top:env(safe-area-inset-top, 0px);--safe-bottom-raw:env(safe-area-inset-bottom, 0px);--safe-bottom-max:34px;--safe-bottom:min(var(--safe-bottom-raw),var(--safe-bottom-max));--quiz-footer-height:82px;--app-height:100svh}
html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
html{height:100%;height:-webkit-fill-available;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--ink);height:100vh;height:var(--app-height);min-height:var(--app-height);overflow:hidden}
@supports(height:100dvh){:root{--app-height:100dvh}}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
*:focus{outline:none}
*:focus-visible{outline:2px solid var(--focus-ring);outline-offset:2px;border-radius:var(--radius)}
.option-btn:focus-visible{outline:2px solid var(--focus-ring);outline-offset:2px;box-shadow:0 0 0 4px rgba(120,160,255,0.15)}
.theme-card:focus-visible,.theme-card-compact:focus-visible{outline:2px solid var(--focus-ring);outline-offset:2px;box-shadow:0 0 0 4px rgba(120,160,255,0.15)}
.skip-link{position:absolute;top:-40px;left:0;background:var(--ink);color:var(--bg);padding:8px 16px;z-index:100;font-size:15px;font-weight:600;border-radius:0 0 var(--radius) 0;transition-property:top;transition-duration:0.2s;transition-timing-function:var(--ease-out)}
.skip-link:focus{top:0}
.app{max-width:680px;margin:0 auto;height:var(--app-height);min-height:0;max-height:var(--app-height);display:flex;flex-direction:column;padding:var(--safe-top) 0 0;transition-property:max-width;transition-duration:0.2s;transition-timing-function:var(--ease-out)}
.app>main{display:flex;flex-direction:column;flex:1;min-height:0}
.app>main>#app{display:flex;flex-direction:column;flex:1;min-height:0}
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--ink-3);font-size:16px}
.loading-spinner{width:32px;height:32px;border:3px solid var(--surface-3);border-top-color:var(--ink-2);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-error{color:var(--wrong);text-align:center;padding:40px 20px;line-height:1.6;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px}
.loading-error button{color:var(--ink);text-decoration:underline;margin-top:12px;font-size:16px}

/* ── HOME ── */
.home{padding:24px 20px calc(24px + var(--safe-bottom));flex:1;display:flex;flex-direction:column;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.home-header{padding:32px 0 24px}
.home-label{font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px}
.home-title{font-size:34px;font-weight:700;letter-spacing:-0.5px;line-height:1.12;color:var(--ink);text-wrap:balance}
.home-subtitle{font-size:17px;color:var(--ink-2);margin-top:10px;line-height:1.47;text-wrap:pretty}
/* Category sections */
.theme-categories{display:flex;flex-direction:column;gap:0}
.category-section{margin-top:4px}
.category-header{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3);font-family:var(--mono);padding:20px 0 10px}
/* 2-col compact grid for homogeneous verb themes */
.theme-grid-2col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.theme-card-compact{background:var(--surface);border:1px solid transparent;border-radius:var(--radius-lg);padding:14px 12px;display:flex;flex-direction:column;align-items:flex-start;gap:8px;position:relative;overflow:hidden;cursor:pointer;box-shadow:var(--shadow-border);transition-property:transform,background-color,box-shadow;transition-duration:0.15s;transition-timing-function:var(--ease-out);text-align:left;width:100%;min-height:96px}
.theme-card-compact:hover{background:var(--surface-2);box-shadow:var(--shadow-border-hover)}
.theme-card-compact:active{transform:scale(0.96)}
.theme-emoji-sm{font-size:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0}
.theme-name-sm{font-size:14px;font-weight:600;letter-spacing:-0.2px;color:var(--ink);text-wrap:balance}
/* Full-width cards for special/fill themes */
.theme-grid{display:flex;flex-direction:column;gap:8px}
.theme-card{background:var(--surface);border:1px solid transparent;border-radius:var(--radius-lg);padding:18px 20px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow-border);transition-property:transform,background-color,box-shadow;transition-duration:0.15s;transition-timing-function:var(--ease-out);position:relative;overflow:hidden;width:100%;min-height:88px}
.theme-card:hover{background:var(--surface-2);box-shadow:var(--shadow-border-hover)}
.theme-card:active{transform:scale(0.96)}
.theme-emoji{font-size:28px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:10px;flex-shrink:0}
.theme-info{flex:1;min-width:0;text-align:left}
.theme-name{font-size:17px;font-weight:600;letter-spacing:-0.2px;text-wrap:balance}
.theme-desc{font-size:13px;color:var(--ink-3);margin-top:3px;font-family:var(--mono);letter-spacing:-0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.theme-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;color:var(--ink-2);background:var(--surface-3);margin-top:4px;display:inline-block;letter-spacing:0.3px;font-family:var(--mono)}
.theme-arrow{color:var(--ink-3);font-size:18px;flex-shrink:0}
.theme-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 3px 3px 0}
/* Mix section gets extra breathing room */
.mix-section{margin-top:28px}

/* ── COUNT SELECT ── */
.count-select{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px calc(24px + var(--safe-bottom));text-align:center;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.count-title{font-size:28px;font-weight:700;margin-bottom:6px;color:var(--ink);letter-spacing:-0.3px;text-wrap:balance}
.count-theme-label{font-size:15px;font-weight:600;margin-bottom:6px;display:inline-flex;align-items:center;gap:6px}
.count-desc{font-size:17px;color:var(--ink-2);margin-bottom:32px;text-wrap:pretty}
.count-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:360px}
.count-grid .btn-result.primary{grid-column:span 2}
.count-btn{background:var(--surface);border:1px solid transparent;padding:20px;border-radius:var(--radius-lg);font-size:22px;font-weight:600;font-family:var(--mono);font-variant-numeric:tabular-nums;color:var(--ink);box-shadow:var(--shadow-border);transition-property:transform,background-color,box-shadow;transition-duration:0.15s;transition-timing-function:var(--ease-out);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;min-height:88px}
.count-btn span{font-size:13px;font-weight:400;color:var(--ink-3);font-family:var(--font)}
.count-btn:hover{background:var(--surface-2);box-shadow:var(--shadow-border-hover)}
.count-btn:active{transform:scale(0.96)}

/* ── QUIZ ── */
.quiz{position:fixed;inset:0;z-index:50;max-width:680px;margin:0 auto;display:flex;flex-direction:column;min-height:0;overflow:hidden;background:var(--bg)}
.quiz-top{padding:calc(16px + var(--safe-top)) 20px 0;flex-shrink:0}
.quiz-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.quiz-back{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid transparent;box-shadow:var(--shadow-border);font-size:17px;transition-property:transform,background-color,box-shadow;transition-duration:0.15s;transition-timing-function:var(--ease-out)}
.quiz-back:hover{background:var(--surface-2);box-shadow:var(--shadow-border-hover)}
.quiz-back:active{transform:scale(0.96)}
.quiz-theme{font-size:15px;font-weight:600;flex:1}
.quiz-counter{font-family:var(--mono);font-size:14px;color:var(--ink-2);font-variant-numeric:tabular-nums}
.progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.progress-bar{flex:1;height:4px;background:var(--surface-3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition-property:width;transition-duration:0.4s;transition-timing-function:cubic-bezier(0.4,0,0.2,1)}
.score-pills{display:flex;gap:8px}
.score-pill{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:600;font-family:var(--mono);font-variant-numeric:tabular-nums;padding:3px 8px;border-radius:6px;min-width:42px;justify-content:center}
.score-pill.correct{background:var(--correct-bg);color:#52B788}
.score-pill.wrong{background:var(--wrong-bg);color:#E8776C}
.score-pill .dot{width:6px;height:6px;border-radius:50%}
.score-pill.correct .dot{background:#52B788}
.score-pill.wrong .dot{background:#E8776C}
.quiz-body{flex:1;padding:20px;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;scroll-padding-bottom:20px}
.question-num{font-size:13px;font-weight:600;color:var(--ink-3);font-family:var(--mono);margin-bottom:12px}
.question-text{font-size:22px;font-weight:500;line-height:1.45;letter-spacing:-0.2px;margin-bottom:28px;min-height:60px;text-wrap:pretty}
.options{display:flex;flex-direction:column;gap:8px}
.option-btn{width:100%;text-align:left;padding:15px 16px;border-radius:var(--radius);background:var(--surface);border:1.5px solid var(--border);font-size:17px;font-weight:400;line-height:1.4;display:flex;align-items:flex-start;gap:12px;transition-property:transform,background-color,border-color;transition-duration:0.15s;transition-timing-function:var(--ease-out);position:relative;min-height:58px}
.option-btn:not(.answered):hover{background:var(--surface-2);border-color:var(--border-2)}
.option-btn:not(.answered):active{transform:scale(0.96)}
.option-key{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;font-family:var(--mono);flex-shrink:0;background:var(--surface-3);color:var(--ink-2)}
.option-text{padding-top:2px;text-wrap:pretty}
.option-btn.answered{pointer-events:none}
.option-btn.is-correct{background:var(--correct-bg);border-color:var(--correct-border)}
.option-btn.is-correct .option-key{background:var(--correct);color:#fff}
.option-btn.is-wrong{background:var(--wrong-bg);border-color:var(--wrong-border)}
.option-btn.is-wrong .option-key{background:var(--wrong);color:#fff}
.option-btn.is-actual-correct{background:var(--correct-bg);border-color:var(--correct-border)}
.option-btn.is-actual-correct .option-key{background:var(--correct);color:#fff}

/* ── FILL-IN INPUT ── */
.fill-input-wrap{display:flex;gap:0;align-items:center;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--radius);padding:4px 4px 4px 16px;transition-property:background-color,border-color;transition-duration:0.15s;transition-timing-function:var(--ease-out)}
.fill-input-wrap:focus-within{border-color:rgba(120,160,255,0.45);background:var(--surface-2)}
.fill-input-wrap.is-correct{border-color:var(--correct-border);background:var(--correct-bg)}
.fill-input-wrap.is-wrong{border-color:var(--wrong-border);background:var(--wrong-bg)}
.fill-input{flex:1;padding:10px 0;border:none;background:transparent;font-size:17px;font-weight:500;color:var(--ink);letter-spacing:0.2px;caret-color:var(--ink);min-width:0;width:100%}
.fill-input::placeholder{color:var(--ink-4);font-weight:400;font-size:16px;letter-spacing:0}
.fill-input:focus{outline:none}
.fill-input:disabled{opacity:0.6;cursor:not-allowed}
.fill-input-wrap.is-correct .fill-input{color:#52B788}
.fill-input-wrap.is-wrong .fill-input{color:#E8776C}
.fill-submit{width:40px;height:40px;border-radius:8px;background:var(--ink);color:var(--bg);font-size:17px;display:flex;align-items:center;justify-content:center;transition-property:transform,opacity,background-color,color;transition-duration:0.15s;transition-timing-function:var(--ease-out);flex-shrink:0;padding:0;line-height:1}
.fill-submit:hover{opacity:0.85}
.fill-submit:active{transform:scale(0.96)}
.fill-submit:disabled{background:var(--surface-3);color:var(--ink-4);pointer-events:none}
.fill-correct-answer{margin-top:12px;font-size:15px;font-family:var(--mono);color:#52B788;font-weight:600;animation:feedbackIn 0.25s var(--ease-out);font-variant-numeric:tabular-nums}
.fill-your-answer{color:#E8776C;font-family:var(--mono);font-weight:500}

/* ── FEEDBACK ── */
.feedback{margin-top:16px;padding:14px 16px;border-radius:var(--radius);font-size:15px;line-height:1.6;animation:feedbackIn 0.25s var(--ease-out)}
@keyframes feedbackIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.feedback.correct{background:var(--correct-bg);border:1px solid var(--correct-border)}
.feedback.wrong{background:var(--wrong-bg);border:1px solid var(--wrong-border)}
.feedback-label{font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px;font-size:16px}
.feedback.correct .feedback-label{color:#52B788}
.feedback.wrong .feedback-label{color:#E8776C}
.feedback-text{color:var(--ink-2);text-wrap:pretty}

/* ── HINT (full-width footer popover) ── */
.hint-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:15px 18px;border-radius:var(--radius);background:var(--hint-bg);border:1px solid var(--hint-border);font-size:15px;font-weight:500;color:var(--ink-3);transition-property:transform,background-color,border-color,color;transition-duration:0.18s;transition-timing-function:var(--ease-out);line-height:1;flex-shrink:0;white-space:nowrap;min-height:48px}
.hint-btn:hover{background:var(--hint-bg-hover);border-color:var(--hint-border-hover);color:var(--hint-color)}
.hint-btn.open{background:var(--hint-bg-hover);border-color:var(--hint-border-hover);color:var(--hint-color)}
.hint-btn .hint-icon{font-size:15px;line-height:1;display:flex;align-items:center}
.hint-btn .hint-chevron{font-size:9px;margin-left:2px;opacity:0.5;transition-property:transform;transition-duration:0.2s;transition-timing-function:var(--ease-out);display:inline-block}
.hint-btn.open .hint-chevron{transform:rotate(180deg)}
.hint-popover{position:relative;margin:0 20px 4px;padding:14px 16px;border-radius:var(--radius);background:var(--surface-3);border:1px solid transparent;font-size:15px;color:var(--ink-2);line-height:1.6;box-shadow:var(--shadow-elevated);animation:hintPopIn 0.2s var(--ease-out);z-index:10;text-wrap:pretty;flex-shrink:0}
@keyframes hintPopIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.hint-popover .hint-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.hint-popover .hint-label{font-size:12px;font-weight:600;color:var(--ink-3);font-family:var(--mono);letter-spacing:0.3px;display:flex;align-items:center;gap:5px}
.hint-close{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:400;color:var(--ink-3);background:transparent;border:0;box-shadow:none;cursor:pointer;transition-property:transform,color;transition-duration:0.15s;transition-timing-function:var(--ease-out);flex-shrink:0;line-height:1}
.hint-close:hover{color:var(--ink)}
.hint-close:active{transform:scale(0.96)}

/* ── QUIZ FOOTER ── */
.quiz-footer{padding:8px 20px calc(10px + var(--safe-bottom));flex-shrink:0;display:flex;flex-direction:column;gap:10px;background:var(--bg);z-index:20}
.quiz-footer-row{display:flex;gap:8px;align-items:center}
.btn-next{width:100%;padding:15px;border-radius:var(--radius);font-size:17px;font-weight:600;text-align:center;transition-property:transform,opacity,background-color,color;transition-duration:0.15s;transition-timing-function:var(--ease-out);letter-spacing:-0.2px;flex:1;min-height:48px}
.btn-next.primary{background:var(--ink);color:var(--bg)}
.btn-next.primary:hover{opacity:0.9}
.btn-next.primary:active{transform:scale(0.96)}
.btn-next.disabled{background:var(--surface-3);color:var(--ink-3);pointer-events:none}

/* ── RESULTS ── */
.results{padding:24px 20px calc(24px + var(--safe-bottom));flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.results-emoji{font-size:64px;margin-bottom:20px;animation:pop 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.results-score{font-size:56px;font-weight:700;letter-spacing:-2px;font-family:var(--mono);font-variant-numeric:tabular-nums}
.results-label{font-size:17px;color:var(--ink-2);margin-top:4px}
.results-msg{font-size:17px;color:var(--ink-2);margin-top:16px;line-height:1.5;max-width:300px;text-wrap:pretty}
.results-stats{display:flex;gap:24px;margin-top:32px}
.stat{text-align:center}
.stat-val{font-size:28px;font-weight:700;font-family:var(--mono);font-variant-numeric:tabular-nums}
.stat-val.g{color:#52B788}.stat-val.r{color:#E8776C}
.stat-label{font-size:13px;color:var(--ink-3);margin-top:4px}
.results-actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;margin-top:36px}
.btn-result{padding:15px;border-radius:var(--radius);font-size:17px;font-weight:600;text-align:center;transition-property:transform,opacity,background-color,color,box-shadow;transition-duration:0.15s;transition-timing-function:var(--ease-out);letter-spacing:-0.2px;min-height:48px}
.btn-result.primary{background:var(--ink);color:var(--bg)}
.btn-result.secondary{background:var(--surface);color:var(--ink);border:1px solid transparent;box-shadow:var(--shadow-border)}
.btn-result:hover{opacity:0.9}
.btn-result:active{transform:scale(0.96)}
.btn-result.link{background:none;border:none;color:var(--ink-3);font-size:15px;font-weight:500}
.btn-result.link:hover{color:var(--ink-2)}

/* ── REVIEW ── */
.review{padding:20px 20px calc(20px + var(--safe-bottom));flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.review-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.review-title{font-size:20px;font-weight:600}
.review-card{background:var(--surface);border:1px solid transparent;border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;box-shadow:var(--shadow-border)}
.review-q{font-size:16px;line-height:1.5;margin-bottom:8px;text-wrap:pretty}
.review-answer{font-size:15px;color:var(--ink-2);line-height:1.5;text-wrap:pretty}
.review-answer strong{color:#52B788;font-weight:600}
.review-answer .wrong-text{color:#E8776C}
.history-tag{display:inline-block;font-size:11px;font-weight:600;font-family:var(--mono);letter-spacing:0.3px;padding:2px 7px;border-radius:4px;background:var(--surface-3);color:var(--ink-2);margin-bottom:8px}
.history-empty{color:var(--ink-3);text-align:center;padding:48px 20px;font-size:15px;line-height:1.6}
.history-actions{display:flex;gap:8px;padding:16px 0;flex-wrap:wrap}
.history-link{display:block;width:100%;text-align:center;padding:14px;margin-top:20px;color:var(--ink-2);font-size:14px;background:var(--surface);border:1px solid transparent;border-radius:var(--radius);box-shadow:var(--shadow-border);text-decoration:none;transition-property:transform,background-color,box-shadow,color;transition-duration:0.15s;transition-timing-function:var(--ease-out);min-height:48px}
.history-link:hover{background:var(--surface-2);box-shadow:var(--shadow-border-hover);color:var(--ink)}
.history-link:active{transform:scale(0.96)}
.history-link .count{color:var(--ink-3);font-family:var(--mono);font-size:13px}

/* ── KEYBOARD HINTS ── */
.kbd-hints{display:none;gap:6px;flex-wrap:wrap;margin-top:16px;justify-content:center}
.quiz-footer .kbd-hints{margin-top:0}
.kbd-hint{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-3);font-family:var(--mono)}
.kbd{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:20px;padding:0 5px;border-radius:4px;background:var(--surface-3);border:1px solid var(--ink-4);font-size:11px;font-weight:600;color:var(--ink-2);font-family:var(--mono);line-height:1}
.hint-kbd{display:none}
@media(hover:hover) and (pointer:fine){
  .kbd-hints{display:flex}
  .hint-kbd{display:inline-flex}
}
@media(pointer:coarse){
  .kbd-hints{display:none !important}
  .hint-kbd{display:none !important}
  .option-btn{padding:10px 14px;gap:10px;font-size:16px}
  .option-key{width:24px;height:24px;font-size:12px;border-radius:5px}
  .options{gap:6px}
  .question-text{font-size:20px;margin-bottom:20px;min-height:auto}
  .question-num{margin-bottom:8px}
  .hint-popover{margin:0 20px 4px;padding:12px 14px;font-size:14px;line-height:1.55}
  .hint-close{width:32px;height:32px}
  .quiz-footer{padding-top:8px;gap:8px}
}
@media(max-width:700px){
  .kbd-hints{display:none !important}
  .hint-kbd{display:none !important}
}

.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body>
<a class="skip-link" href="#main-content">Ga naar inhoud</a>
<div class="app">
  <main id="main-content">
    <div id="app" role="application">
      <div class="loading"><div class="loading-spinner"></div><div>Vragen laden...</div></div>
    </div>
  </main>
</div>
<noscript>
  <div style="padding:40px 20px;text-align:center;color:#A0A3AD;font-family:system-ui,sans-serif;">
    <p style="font-size:18px;margin-bottom:8px;">JavaScript is vereist</p>
    <p>Schakel JavaScript in om Taalbits te gebruiken.</p>
  </div>
</noscript>
<div id="sr-announce" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<script>
// ── XSS sanitization ──
function esc(str){
  if(typeof str!=="string")return str;
  var d=document.createElement("div");
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function setAppHeight(){
  var height=window.visualViewport?window.visualViewport.height:window.innerHeight;
  if(height>0)document.documentElement.style.setProperty("--app-height",height+"px");
}
setAppHeight();
window.addEventListener("resize",setAppHeight,{passive:true});
window.addEventListener("orientationchange",function(){setAppHeight();setTimeout(setAppHeight,250)});
if(window.visualViewport)window.visualViewport.addEventListener("resize",setAppHeight,{passive:true});

const KEYS=["A","B","C","D"];
const KEY_MAP={a:0,b:1,c:2,d:3,"1":0,"2":1,"3":2,"4":3};
let THEMES=[];
const MIX_THEME = {id: "mix", label: "Alles door elkaar", description: "Test je kennis van alle thema's", emoji: "🎲", color: "#E09F3E"};
let questionCache={};
let shuffledQuestions=[];
let state={screen:"loading",theme:null,qIdx:0,score:0,wrong:0,answered:null,selectedIdx:null,showHint:false,wrongAnswers:[],showReview:false,pendingTheme:null,fillInput:""};
let pendingFocus=null;

// ── Wrong-answer history (localStorage) ──
const HISTORY_KEY="taalbits.wrongHistory.v1";
const HISTORY_MAX=200;
function loadWrongHistory(){try{var raw=localStorage.getItem(HISTORY_KEY);return raw?JSON.parse(raw):[]}catch(e){return []}}
function saveWrongToHistory(entry){try{var hist=loadWrongHistory();hist.unshift(entry);if(hist.length>HISTORY_MAX)hist=hist.slice(0,HISTORY_MAX);localStorage.setItem(HISTORY_KEY,JSON.stringify(hist))}catch(e){console.warn("history save failed",e)}}
function clearWrongHistory(){try{localStorage.removeItem(HISTORY_KEY)}catch(e){}render();announce("Geschiedenis gewist.")}
function getQuestionThemeId(q){return (q&&q._themeId)?q._themeId:state.theme}
function recordWrongAnswer(q,selected,correct){saveWrongToHistory({themeId:getQuestionThemeId(q),sentence:q.sentence,correct:correct,selected:selected,explanation:q.explanation||"",ts:Date.now()})}

function announce(text){const el=document.getElementById("sr-announce");if(el){el.textContent="";requestAnimationFrame(()=>{el.textContent=text})}}

function getQuizType(themeId){
  if(themeId==="mix")return "mc";
  var t=THEMES.find(function(x){return x.id===themeId});
  return (t&&t.type)?t.type:"mc";
}

function getCurrentQuizType(){
  // For mix mode, check the individual question
  if(state.theme==="mix"){
    // Mix only includes MC themes for now
    return "mc";
  }
  return getQuizType(state.theme);
}

async function loadThemes(){try{const res=await fetch("data/themes.json");if(!res.ok)throw new Error("HTTP "+res.status);THEMES=await res.json();console.log("Loaded "+THEMES.length+" themes");state.screen="home";render()}catch(err){console.error("Failed to load themes:",err);document.getElementById("app").innerHTML='<div class="loading-error"><p>Kon de thema\'s niet laden.</p><p style="font-size:14px;color:var(--ink-3)">'+esc(err.message)+'</p><button onclick="loadThemes()">Opnieuw proberen</button></div>'}}
async function loadThemeQuestions(themeId){if(questionCache[themeId])return questionCache[themeId];const res=await fetch("data/"+encodeURIComponent(themeId)+".json");if(!res.ok)throw new Error("HTTP "+res.status);const questions=await res.json();questionCache[themeId]=questions;return questions}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function shuffleQuestionOptions(q){if(!q.options||!Number.isInteger(q.correct))return q;const shuffled=shuffle(q.options.map(function(option,oldIndex){return{option,oldIndex}}));const wrongExplanations={};shuffled.forEach(function(item,newIndex){if(item.oldIndex!==q.correct&&q.wrongExplanations&&q.wrongExplanations[String(item.oldIndex)]){wrongExplanations[String(newIndex)]=q.wrongExplanations[String(item.oldIndex)]}});return Object.assign({},q,{options:shuffled.map(function(item){return item.option}),correct:shuffled.findIndex(function(item){return item.oldIndex===q.correct}),wrongExplanations:wrongExplanations})}

// ── Count selection for individual themes ──
function openThemeCountSelect(themeId) {
  state.screen = "count-select";
  state.pendingTheme = themeId;
  pendingFocus = "count-10";
  render();
  var t = THEMES.find(function(x){return x.id===themeId});
  announce("Kies het aantal vragen voor " + (t ? t.label : themeId) + ".");
}

async function startThemeQuiz(themeId, count) {
  state={screen:"loading",theme:themeId,qIdx:0,score:0,wrong:0,answered:null,selectedIdx:null,showHint:false,wrongAnswers:[],showReview:false,pendingTheme:null,fillInput:""};
  render();
  try {
    const questions = await loadThemeQuestions(themeId);
    shuffledQuestions = shuffle(questions);
    if (count !== 'all') {
      shuffledQuestions = shuffledQuestions.slice(0, count);
    }
    if (getQuizType(themeId) === "mc") {
      shuffledQuestions = shuffledQuestions.map(shuffleQuestionOptions);
    }
    state.screen = "quiz";
    pendingFocus = getQuizType(themeId)==="fill" ? "fill-input" : "option-0";
    render();
    announce("Quiz gestart. Vraag 1 van " + shuffledQuestions.length + ".");
  } catch(err) {
    console.error("Failed to load questions:", themeId, err);
    document.getElementById("app").innerHTML='<div class="loading-error"><p>Kon de vragen niet laden.</p><button onclick="openThemeCountSelect(\''+esc(themeId)+'\')">Opnieuw proberen</button></div>';
  }
}

async function startQuiz(id) {
  openThemeCountSelect(id);
}

function openCountSelect() {
  state.screen = "count-select";
  state.pendingTheme = "mix";
  pendingFocus = "count-10";
  render();
  announce("Kies het aantal vragen: 10, 20 of 50.");
}

async function startMixQuiz(count) {
  state={screen:"loading",theme:"mix",qIdx:0,score:0,wrong:0,answered:null,selectedIdx:null,showHint:false,wrongAnswers:[],showReview:false,pendingTheme:null,fillInput:""};
  render();
  try {
    // Only include MC themes in mix mode
    const mcThemes = THEMES.filter(function(t){return (t.type||"mc")==="mc"});
    const promises = mcThemes.map(t => loadThemeQuestions(t.id));
    const results = await Promise.all(promises);
    let allQuestions = results.flatMap(function(qs,i){return qs.map(function(q){return Object.assign({_themeId:mcThemes[i].id},q)})});
    shuffledQuestions = shuffle(allQuestions);
    if(count !== 'all') {
      shuffledQuestions = shuffledQuestions.slice(0, count);
    }
    shuffledQuestions = shuffledQuestions.map(shuffleQuestionOptions);
    state.screen = "quiz";
    pendingFocus = "option-0";
    render();
    announce("Mix quiz gestart met " + shuffledQuestions.length + " vragen.");
  } catch (err) {
    console.error("Failed to start mix quiz:", err);
    document.getElementById("app").innerHTML='<div class="loading-error"><p>Kon de mix quiz niet laden.</p><button onclick="loadThemes()">Terug naar home</button></div>';
  }
}

function goHome(){state={screen:"home",theme:null,qIdx:0,score:0,wrong:0,answered:null,selectedIdx:null,showHint:false,wrongAnswers:[],showReview:false,pendingTheme:null,fillInput:""};pendingFocus="theme-0";render();}

function selectAnswer(idx){if(state.answered!==null)return;const q=shuffledQuestions[state.qIdx],isC=idx===q.correct;state.showHint=false;state.answered=isC?"correct":"wrong";state.selectedIdx=idx;if(isC){state.score++;announce("Goed! "+q.explanation)}else{state.wrong++;state.wrongAnswers.push({q:q.sentence,selected:q.options[idx],correct:q.options[q.correct],explanation:q.explanation});recordWrongAnswer(q,q.options[idx],q.options[q.correct]);announce("Fout. "+q.options[q.correct])}pendingFocus="btn-next";render()}

function submitFillAnswer(){
  if(state.answered!==null)return;
  var q=shuffledQuestions[state.qIdx];
  var input=(state.fillInput||"").trim().toLowerCase();
  if(!input)return;
  var isCorrect=q.acceptedAnswers.some(function(a){return a.toLowerCase()===input});
  state.showHint=false;
  state.answered=isCorrect?"correct":"wrong";
  state.selectedIdx=input;
  if(isCorrect){
    state.score++;
    announce("Goed! "+q.explanation);
  }else{
    state.wrong++;
    state.wrongAnswers.push({q:q.sentence,selected:input,correct:q.answer,explanation:q.explanation});
    recordWrongAnswer(q,input,q.answer);
    announce("Fout. Het juiste antwoord is: "+q.answer);
  }
  pendingFocus="btn-next";
  render();
}

function nextQuestion(){if(state.qIdx>=shuffledQuestions.length-1){state.screen="results";pendingFocus="btn-retry";render();announce("Quiz afgelopen. Score: "+Math.round(state.score/shuffledQuestions.length*100)+"%");return}state.qIdx++;state.answered=null;state.selectedIdx=null;state.showHint=false;state.fillInput="";var type=getCurrentQuizType();pendingFocus=type==="fill"?"fill-input":"option-0";render();announce("Vraag "+(state.qIdx+1))}
function toggleHint(){state.showHint=!state.showHint;pendingFocus="hint-btn";render();if(state.showHint)announce("Hint: "+shuffledQuestions[state.qIdx].hint)}
function toggleReview(){state.showReview=!state.showReview;pendingFocus=state.showReview?"review-back":"btn-review";render()}
function getThemeQuestionCount(themeId){if(questionCache[themeId])return questionCache[themeId].length;return "~40"}

function openHistory(){state.screen="history";pendingFocus="history-back";render();announce("Foute antwoorden geschiedenis.")}
function render(){const app=document.getElementById("app");switch(state.screen){case"loading":app.innerHTML='<div class="loading"><div class="loading-spinner"></div><div>Vragen laden...</div></div>';break;case"home":app.innerHTML=renderHome();break;case"count-select":app.innerHTML=renderCountSelect();break;case"quiz":app.innerHTML=renderQuiz();break;case"history":app.innerHTML=renderHistory();break;case"results":app.innerHTML=state.showReview?renderReview():renderResults();break;}if(pendingFocus){requestAnimationFrame(()=>{const el=document.getElementById(pendingFocus);if(el){el.focus();// Restore fill input value after render
if(pendingFocus==="fill-input"&&state.fillInput){el.value=state.fillInput}}pendingFocus=null})}}

function renderHome(){
  var mcThemes=THEMES.filter(function(t){return (t.type||"mc")==="mc"});
  var fillThemes=THEMES.filter(function(t){return t.type==="fill"});

  // Samengestelde werkwoorden — 2-column compact grid
  var verbCards=mcThemes.map(function(t,idx){
    return '<button class="theme-card-compact" id="theme-'+idx+'" onclick="openThemeCountSelect(\''+esc(t.id)+'\')" aria-label="'+esc(t.label)+'"><div class="theme-accent" style="background:'+esc(t.color)+'"></div><div class="theme-emoji-sm" style="background:'+esc(t.color)+'15">'+esc(t.emoji)+'</div><div class="theme-name-sm">'+esc(t.label)+'</div></button>';
  }).join("");
  var werkwoordenSection='<div class="category-section"><div class="category-header">Samengestelde werkwoorden</div><div class="theme-grid-2col">'+verbCards+'</div></div>';

  // Fill-in themes — full-width cards under their own header
  var fillSection="";
  if(fillThemes.length>0){
    var fillCards=fillThemes.map(function(t){
      return '<button class="theme-card" onclick="openThemeCountSelect(\''+esc(t.id)+'\')" aria-label="'+esc(t.label)+'"><div class="theme-accent" style="background:'+esc(t.color)+'"></div><div class="theme-emoji" style="background:'+esc(t.color)+'15">'+esc(t.emoji)+'</div><div class="theme-info"><div class="theme-name">'+esc(t.label)+'</div><div class="theme-desc">'+esc(t.description)+'</div><div class="theme-badge">INVULLEN</div></div><div class="theme-arrow">›</div></button>';
    }).join("");
    fillSection='<div class="category-section"><div class="category-header">Preposities</div><div class="theme-grid">'+fillCards+'</div></div>';
  }

  // Mix — own section with extra top spacing
  var mixSection='<div class="mix-section"><div class="category-header">Gemengd</div><button class="theme-card" id="theme-mix" onclick="openCountSelect()" aria-label="Alles door elkaar"><div class="theme-accent" style="background:'+MIX_THEME.color+'"></div><div class="theme-emoji" style="background:'+MIX_THEME.color+'15">'+MIX_THEME.emoji+'</div><div class="theme-info"><div class="theme-name">'+MIX_THEME.label+'</div><div class="theme-desc">'+MIX_THEME.description+'</div></div><div class="theme-arrow">›</div></button></div>';

  var histCount=loadWrongHistory().length;
  var historyLink=histCount>0?'<button class="history-link" onclick="openHistory()" aria-label="Foute antwoorden geschiedenis">Foute antwoorden geschiedenis <span class="count">('+histCount+')</span></button>':'';
  return '<div class="home"><div class="home-header"><div class="home-label">Taalbits</div><div class="home-title">Korte oefeningen voor lastig Nederlands.</div><div class="home-subtitle">Oefen werkwoorden, preposities en vaste combinaties op B1+ niveau.</div></div><nav class="theme-categories" aria-label="Themakeuze">'+werkwoordenSection+fillSection+mixSection+'</nav>'+historyLink+'<div class="kbd-hints"><span class="kbd-hint"><span class="kbd">Tab</span> navigeren</span><span class="kbd-hint"><span class="kbd">Enter</span> selecteren</span></div></div>';
}

function renderCountSelect() {
  var isMix = (state.pendingTheme === "mix");
  var t = isMix ? MIX_THEME : THEMES.find(function(x){return x.id===state.pendingTheme});
  var themeLabel = t ? (t.emoji + " " + t.label) : "";
  var totalCount = isMix ? "alles" : getThemeQuestionCount(state.pendingTheme);
  var safeThemeId = esc(state.pendingTheme);
  var isFill = !isMix && t && t.type === "fill";
  var desc = isFill ? "Vul het juiste voorzetsel in bij elke zin." : (isMix ? "Kies een aantal vragen uit alle thema's." : "Kies hoeveel vragen je wilt oefenen.");

  var buttons = '';
  buttons += '<button class="count-btn" id="count-10" onclick="'+(isMix?"startMixQuiz(10)":"startThemeQuiz('"+safeThemeId+"',10)")+'">10<span>vragen</span></button>';
  buttons += '<button class="count-btn" onclick="'+(isMix?"startMixQuiz(20)":"startThemeQuiz('"+safeThemeId+"',20)")+'">20<span>vragen</span></button>';

  if (isMix) {
    buttons += '<button class="count-btn" onclick="startMixQuiz(50)" style="grid-column:span 2">50<span>vragen</span></button>';
  } else {
    buttons += '<button class="count-btn" onclick="startThemeQuiz(\''+safeThemeId+'\',\'all\')" style="grid-column:span 2">Alles<span>alle vragen</span></button>';
  }

  return '<div class="count-select"><div class="count-theme-label" style="color:'+esc(t.color)+'">'+esc(themeLabel)+'</div><div class="count-title">Hoeveel vragen?</div><div class="count-desc">'+desc+'</div><div class="count-grid">'+buttons+'</div><button class="quiz-back" onclick="goHome()" style="margin-top:32px;width:auto;padding:0 20px;height:44px;gap:8px;font-size:15px">← Terug</button></div>';
}

function renderQuiz(){
  var quizType=getCurrentQuizType();
  var t = (state.theme === "mix") ? MIX_THEME : THEMES.find(function(x){return x.id===state.theme});
  var q=shuffledQuestions[state.qIdx],total=shuffledQuestions.length,pct=((state.qIdx+(state.answered?1:0))/total*100).toFixed(1);

  // Build question area based on type
  var questionArea="";
  if(quizType==="fill"){
    questionArea=renderFillQuestion(q,t);
  }else{
    questionArea=renderMCQuestion(q,t);
  }

  // Feedback
  var fb="";
  if(state.answered){
    var isC=state.answered==="correct";
    var label=isC?"✓ Goed!":"✗ Niet helemaal";
    var text="";
    if(quizType==="fill"){
      text=esc(q.explanation);
      if(!isC){
        text='<span class="fill-your-answer">Jouw antwoord: '+esc(String(state.selectedIdx))+'</span><br><br>'+text;
      }
    }else{
      text=isC?esc(q.explanation):(esc(q.wrongExplanations[state.selectedIdx]||"")+"<br><br>"+esc(q.explanation));
    }
    fb='<div class="feedback '+state.answered+'" role="alert"><div class="feedback-label">'+label+'</div><div class="feedback-text">'+text+'</div></div>';
  }

  // Correct answer display for fill-in after wrong
  var correctDisplay="";
  if(quizType==="fill"&&state.answered==="wrong"){
    var allAnswers=q.acceptedAnswers.join(" / ");
    correctDisplay='<div class="fill-correct-answer">Juiste antwoord: '+esc(allAnswers)+'</div>';
  }

  // Keyboard hints
  var kbdBar="";
  if(quizType==="fill"){
    kbdBar='<div class="kbd-hints"><span class="kbd-hint"><span class="kbd">Enter</span> controleer / volgende</span><span class="kbd-hint"><span class="kbd">H</span> hint</span><span class="kbd-hint"><span class="kbd">Esc</span> terug</span></div>';
  }else{
    kbdBar='<div class="kbd-hints"><span class="kbd-hint"><span class="kbd">A</span><span class="kbd">B</span><span class="kbd">C</span><span class="kbd">D</span> kies</span><span class="kbd-hint"><span class="kbd">H</span> hint</span><span class="kbd-hint"><span class="kbd">Enter</span> volgende</span><span class="kbd-hint"><span class="kbd">Esc</span> terug</span></div>';
  }

  // Hint popover sits just above the footer while the footer controls stay stable.
  var hintPopover="";
  var hintButton='<button class="hint-btn'+(state.showHint?" open":"")+'" id="hint-btn" onclick="toggleHint()" aria-expanded="'+(state.showHint?"true":"false")+'" aria-controls="hint-box"'+(state.answered?' disabled':'')+' style="'+(state.answered?'opacity:0.4;pointer-events:none':'')+'"><span class="hint-icon">💡</span><span>Hint</span><span class="hint-chevron">▾</span></button>';
  if(!state.answered&&state.showHint){hintPopover='<div class="hint-popover" id="hint-box" role="region" aria-label="Hint"><div class="hint-header"><div class="hint-label"><span>💡</span> Hint</div><button class="hint-close" onclick="toggleHint()" aria-label="Hint sluiten" id="hint-close-btn">&times;</button></div>'+esc(q.hint)+'</div>'}

  // Footer
  var footerRow='<div class="quiz-footer-row">'+hintButton+'<button class="btn-next '+(state.answered?"primary":"disabled")+'" id="btn-next" onclick="nextQuestion()"'+(state.answered?'':' tabindex="-1" aria-disabled="true"')+'>'+(state.qIdx>=total-1&&state.answered?"Resultaten bekijken":"Volgende →")+'</button></div>';

  return '<div class="quiz"><div class="quiz-top"><div class="quiz-nav"><button class="quiz-back" onclick="goHome()" aria-label="Terug naar thema\'s (Escape)">←</button><div class="quiz-theme" style="color:'+esc(t.color)+'">'+esc(t.emoji)+" "+esc(t.label)+'</div><div class="quiz-counter" aria-label="Voortgang">'+(state.qIdx+1)+" / "+total+'</div></div><div class="progress-wrap"><div class="progress-bar" role="progressbar" aria-valuenow="'+pct+'" aria-valuemin="0" aria-valuemax="100"><div class="progress-fill" style="width:'+pct+"%;background:"+esc(t.color)+'"></div></div><div class="score-pills" aria-label="Score"><div class="score-pill correct" aria-label="'+state.score+' goed"><span class="dot"></span>'+state.score+'</div><div class="score-pill wrong" aria-label="'+state.wrong+' fout"><span class="dot"></span>'+state.wrong+'</div></div></div></div><div class="quiz-body"><div class="question-num">'+esc(t.label)+" · Vraag "+(state.qIdx+1)+'</div><div class="question-text" id="question-text">'+esc(q.sentence)+'</div>'+questionArea+correctDisplay+fb+'</div>'+hintPopover+'<div class="quiz-footer">'+kbdBar+footerRow+"</div></div>";
}

function renderFillQuestion(q,t){
  var wrapCls="fill-input-wrap";
  var inputDisabled="";
  var btnDisabled="";
  if(state.answered){
    wrapCls+=" "+(state.answered==="correct"?"is-correct":"is-wrong");
    inputDisabled=' disabled';
    btnDisabled=' disabled';
  }
  var inputVal=state.answered?esc(String(state.selectedIdx)):'';
  return '<div class="'+wrapCls+'"><input type="text" class="fill-input" id="fill-input" placeholder="voorzetsel..." autocomplete="off" autocapitalize="none" spellcheck="false" value="'+inputVal+'"'+inputDisabled+' oninput="state.fillInput=this.value"><button class="fill-submit" id="fill-submit" onclick="submitFillAnswer()"'+btnDisabled+' aria-label="Controleer">→</button></div>';
}

function renderMCQuestion(q,t){
  return '<div class="options" role="group" aria-labelledby="question-text">'+q.options.map(function(opt,i){var cls="option-btn";var ariaLabel=KEYS[i]+": "+esc(opt);if(state.answered){cls+=" answered";if(i===q.correct){cls+=" is-correct is-actual-correct";ariaLabel+=" (juist antwoord)"}else if(i===state.selectedIdx&&state.answered==="wrong"){cls+=" is-wrong";ariaLabel+=" (jouw foute antwoord)"}}return '<button class="'+cls+'" id="option-'+i+'" onclick="selectAnswer('+i+')" aria-label="'+ariaLabel+'"'+(state.answered?' tabindex="-1"':'')+'><span class="option-key">'+KEYS[i]+'</span><span class="option-text">'+esc(opt)+"</span></button>"}).join("")+"</div>";
}

function renderResults(){var total=shuffledQuestions.length,pct=Math.round(state.score/total*100),emoji="🎉",msg="Uitstekend! Je beheerst deze werkwoorden goed.";if(pct<50){emoji="📚";msg="Blijf oefenen! Herhaling is de sleutel tot succes."}else if(pct<70){emoji="💪";msg="Goed bezig! Nog een paar rondes en je hebt het onder de knie."}else if(pct<90){emoji="🌟";msg="Heel goed! Je bent er bijna."}var t = (state.theme === "mix") ? MIX_THEME : THEMES.find(function(x){return x.id===state.theme});var retryAction = (state.theme === "mix") ? "openCountSelect()" : "openThemeCountSelect('"+esc(state.theme)+"')";return '<div class="results"><div class="results-emoji">'+emoji+'</div><div class="results-score" style="color:'+esc(t.color)+'">'+pct+'%</div><div class="results-label">'+state.score+" van "+total+' goed</div><div class="results-msg">'+msg+'</div><div class="results-stats"><div class="stat"><div class="stat-val g">'+state.score+'</div><div class="stat-label">Goed</div></div><div class="stat"><div class="stat-val r">'+state.wrong+'</div><div class="stat-label">Fout</div></div><div class="stat"><div class="stat-val" style="color:'+esc(t.color)+'">'+total+'</div><div class="stat-label">Totaal</div></div></div><div class="results-actions"><button class="btn-result primary" id="btn-retry" onclick="'+retryAction+'">Opnieuw proberen</button>'+(state.wrong>0?'<button class="btn-result secondary" id="btn-review" onclick="toggleReview()">Foute antwoorden bekijken ('+state.wrong+")</button>":"")+'<button class="btn-result link" onclick="goHome()">← Terug naar thema\'s</button></div><div class="kbd-hints"><span class="kbd-hint"><span class="kbd">Enter</span> opnieuw</span><span class="kbd-hint"><span class="kbd">Esc</span> terug</span></div></div>'}

function renderHistory(){
  var hist=loadWrongHistory();
  if(hist.length===0){
    return '<div class="review"><div class="review-header"><button class="quiz-back" id="history-back" onclick="goHome()" aria-label="Terug (Escape)">←</button><div class="review-title">Foute antwoorden</div></div><div class="history-empty">Nog geen foute antwoorden opgeslagen.<br>Maak een quiz en je fouten verschijnen hier.</div></div>';
  }
  var cards=hist.map(function(w,i){
    var t=THEMES.find(function(x){return x.id===w.themeId});
    var tagLabel=t?(t.emoji+" "+t.label):(w.themeId||"");
    var tagStyle=t?(' style="color:'+esc(t.color)+'"'):'';
    return '<div class="review-card"><div class="history-tag"'+tagStyle+'>'+esc(tagLabel)+'</div><div class="review-q">'+esc(w.sentence)+'</div><div class="review-answer"><span class="wrong-text">Jouw antwoord: '+esc(w.selected)+'</span><br><strong>Correct: '+esc(w.correct)+'</strong>'+(w.explanation?'<br>'+esc(w.explanation):'')+'</div></div>';
  }).join("");
  return '<div class="review"><div class="review-header"><button class="quiz-back" id="history-back" onclick="goHome()" aria-label="Terug (Escape)">←</button><div class="review-title">Foute antwoorden ('+hist.length+')</div></div>'+cards+'<div class="history-actions"><button class="btn-result secondary" onclick="clearWrongHistory()" style="width:100%">Geschiedenis wissen</button></div></div>';
}
function renderReview(){var retryAction = (state.theme === "mix") ? "openCountSelect()" : "openThemeCountSelect('"+esc(state.theme)+"')";return '<div class="review"><div class="review-header"><button class="quiz-back" id="review-back" onclick="toggleReview()" aria-label="Terug naar resultaten (Escape)">←</button><div class="review-title">Foute antwoorden ('+state.wrongAnswers.length+')</div></div>'+state.wrongAnswers.map(function(w,i){return '<div class="review-card"><div class="review-q">'+(i+1)+". "+esc(w.q)+'</div><div class="review-answer"><span class="wrong-text">Jouw antwoord: '+esc(w.selected)+"</span><br><strong>Correct: "+esc(w.correct)+"</strong><br>"+esc(w.explanation)+"</div></div>"}).join("")+'<div style="padding:16px 0"><button class="btn-result primary" onclick="'+retryAction+'" style="width:100%">Opnieuw proberen</button></div></div>'}

document.addEventListener("keydown",function(e){
  if(e.target.tagName==="TEXTAREA")return;
  var key=e.key.toLowerCase();

  // Special handling for fill-in input
  if(e.target.id==="fill-input"){
    if(key==="enter"){
      e.preventDefault();
      if(state.answered===null){
        submitFillAnswer();
      }else{
        nextQuestion();
      }
      return;
    }
    if(key==="escape"){
      e.preventDefault();
      if(state.showHint){toggleHint()}else{goHome()}
      return;
    }
    if(key==="h"&&e.ctrlKey&&state.answered===null){
      e.preventDefault();
      toggleHint();
      return;
    }
    return; // Let other keys type normally
  }

  if(state.screen==="quiz"){
    var quizType=getCurrentQuizType();
    if(quizType==="mc"&&key in KEY_MAP&&state.answered===null){e.preventDefault();selectAnswer(KEY_MAP[key]);return}
    if((key==="enter"||key===" ")&&state.answered!==null){var active=document.activeElement;if(!active||active===document.body||active.classList.contains("btn-next")){e.preventDefault();nextQuestion();return}}
    if(key==="h"&&state.answered===null){e.preventDefault();toggleHint();return}
    if(key==="escape"){e.preventDefault();if(state.showHint){toggleHint()}else{goHome()}return}
    if(quizType==="mc"&&(key==="arrowdown"||key==="arrowup")&&state.answered===null){e.preventDefault();var opts=document.querySelectorAll(".option-btn:not(.answered)");if(opts.length===0)return;var currentIdx=-1;opts.forEach(function(o,i){if(o===document.activeElement)currentIdx=i});if(key==="arrowdown"){currentIdx=(currentIdx+1)%opts.length}else{currentIdx=(currentIdx-1+opts.length)%opts.length}opts[currentIdx].focus();return}
  }
  if(state.screen==="home"){if(key==="arrowdown"||key==="arrowup"){e.preventDefault();var cards=document.querySelectorAll(".theme-card-compact,.theme-card");if(cards.length===0)return;var ci=-1;cards.forEach(function(c,i){if(c===document.activeElement)ci=i});if(key==="arrowdown"){ci=(ci+1)%cards.length}else{ci=(ci-1+cards.length)%cards.length}cards[ci].focus();return}}
  if(state.screen==="count-select"){if(key==="escape"){e.preventDefault();goHome();return}}
  if(state.screen==="history"){if(key==="escape"){e.preventDefault();goHome();return}}
  if(state.screen==="results"){if(key==="enter"){var af=document.activeElement;if(!af||af===document.body){e.preventDefault();if(state.theme === "mix") openCountSelect();else openThemeCountSelect(state.theme);return}}if(key==="escape"){e.preventDefault();if(state.showReview){toggleReview()}else{goHome()}return}}
});

if("serviceWorker" in navigator){
  window.addEventListener("load",function(){
    navigator.serviceWorker.register("sw.js").catch(function(err){
      console.warn("Service worker registration failed:",err);
    });
  });
}

loadThemes();
</script>
